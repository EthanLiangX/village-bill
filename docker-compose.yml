version: '3.8'

services:
  village-bill:
    build:
      context: .
      dockerfile: Dockerfile
    image: village-bill:latest
    container_name: village-bill
    restart: always # 如果服务意外挂掉，自动重启
    ports:
      - "8618:8080" # 映射主机的 8618 端口到容器内的 8080
    volumes:
      # 持久化主要数据库文件 (注意：在初次运行 docker-compose up 前，宿主机上必须有名为 village-bill.db 的文件，
      # 否则 Docker 会将其作为一个目录创建)
      - ./village-bill.db:/app/village-bill.db
      # 持久化上传的文件目录
      - ./uploads:/app/uploads
      # 映射日志文件以便于在宿主机上查看
      - ./logs.txt:/app/logs.txt
      - ./logs.err:/app/logs.err
    # 如果系统有设置时区的需求，也可以在这里指定环境变量
    environment:
      - TZ=Asia/Shanghai
